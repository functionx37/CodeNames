# Put these blocks inside your nginx server block.
# Static files are expected at /var/www/codenames/dist/client/.

location = /codenames {
    return 301 /codenames/;
}

location /codenames/ {
    alias /var/www/codenames/dist/client/;
    try_files $uri $uri/ /codenames/index.html;
}

location /codenames/api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:3001;
}

location /codenames/socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://127.0.0.1:3001;
}
